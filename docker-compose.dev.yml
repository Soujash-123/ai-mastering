services:
  backend:
    volumes:
      - ./backend/data:/app/backend/data

  frontend-app:
    build:
      target: deps
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  frontend:
    profiles:
      - prod

volumes:
  frontend_node_modules:
