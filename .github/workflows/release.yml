name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 0.1.1)"
        required: true
      release_message:
        description: "Optional release message"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release metadata
        shell: bash
        run: |
          set -Eeuo pipefail

          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          RELEASE_MESSAGE="${{ github.event.inputs.release_message }}"

          if [ -z "$RELEASE_MESSAGE" ]; then
            RELEASE_MESSAGE="Release $RELEASE_VERSION"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_MESSAGE=$RELEASE_MESSAGE" >> "$GITHUB_ENV"

      - name: Verify RELEASE_PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          echo "Checking RELEASE_PAT..."

          if [ -z "$RELEASE_PAT" ]; then
            echo "❌ RELEASE_PAT is EMPTY!"
            exit 1
          fi

          echo "✅ RELEASE_PAT exists."
          echo "PAT length: ${#RELEASE_PAT}"

      - name: Configure target remote
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git remote remove target || true
          git remote add target https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git

      - name: Debug Git configuration
        run: |
          echo "===== REMOTES ====="
          git remote -v

          echo ""
          echo "===== GIT CONFIG ====="
          git config --list --show-origin

          echo ""
          echo "===== CURRENT BRANCH ====="
          git branch

          echo ""
          echo "===== LAST COMMIT ====="
          git log --oneline -1

      # - name: Push main branch
      #   run: |
      #     git push --force target main:main

      # - name: Create release tag
      #   run: |
      #     git tag -a "v${RELEASE_VERSION}" -m "${RELEASE_MESSAGE}"

      # - name: Push release tag
      #   run: |
      #     git push target "v${RELEASE_VERSION}"
