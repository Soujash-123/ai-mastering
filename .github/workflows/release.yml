name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 0.1.1)"
        required: true
      release_message:
        description: "Optional release message"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release metadata
        shell: bash
        run: |
          set -Eeuo pipefail

          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          RELEASE_MESSAGE="${{ github.event.inputs.release_message }}"

          if [ -z "$RELEASE_MESSAGE" ]; then
            RELEASE_MESSAGE="Release $RELEASE_VERSION"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_MESSAGE=$RELEASE_MESSAGE" >> "$GITHUB_ENV"

      - name: Verify RELEASE_PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "ERROR: RELEASE_PAT secret is missing."
            exit 1
          fi

          echo "RELEASE_PAT found."

      - name: Push to Production Repository
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git fetch https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git main || true

          git push --force-with-lease \
            https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git \
            HEAD:main

      - name: Create Release Tag
        run: |
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "ERROR: Tag v${RELEASE_VERSION} already exists."
            exit 1
          fi

          git tag -a "v${RELEASE_VERSION}" -m "${RELEASE_MESSAGE}"

      - name: Push Release Tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git push \
            https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git \
            "v${RELEASE_VERSION}"
