name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 0.1.1)"
        required: true
      release_message:
        description: "Optional release message"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release metadata
        shell: bash
        run: |
          set -Eeuo pipefail

          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          RELEASE_MESSAGE="${{ github.event.inputs.release_message }}"

          if [ -z "$RELEASE_MESSAGE" ]; then
            RELEASE_MESSAGE="Release $RELEASE_VERSION"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_MESSAGE=$RELEASE_MESSAGE" >> "$GITHUB_ENV"

      - name: Verify RELEASE_PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "❌ RELEASE_PAT is EMPTY!"
            exit 1
          fi

          echo "✅ RELEASE_PAT found."
          echo "PAT length: ${#RELEASE_PAT}"

      - name: Configure target remote
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git remote remove target || true
          git remote add target https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git

      - name: Debug remotes
        run: |
          echo "===== REMOTES ====="
          git remote -v

          echo ""
          echo "===== GIT CONFIG ====="
          git config --list --show-origin

      - name: Test GitHub API authentication
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          echo "===== AUTHENTICATED USER ====="
          curl -s \
            -H "Authorization: Bearer ${RELEASE_PAT}" \
            https://api.github.com/user

          echo ""
          echo "========================================"
          echo ""

          echo "===== REPOSITORY ACCESS ====="
          curl -s \
            -H "Authorization: Bearer ${RELEASE_PAT}" \
            https://api.github.com/repos/Soujash-123/ai-mastering

      - name: Test Git authentication
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          echo "===== TESTING GIT AUTH ====="
          git ls-remote https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git

      - name: Push main branch
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git push \
            https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git \
            HEAD:main

      - name: Create release tag
        run: |
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "❌ Tag v${RELEASE_VERSION} already exists."
            exit 1
          fi

          git tag -a "v${RELEASE_VERSION}" -m "${RELEASE_MESSAGE}"

      - name: Push release tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git push \
            https://x-access-token:${RELEASE_PAT}@github.com/Soujash-123/ai-mastering.git \
            "v${RELEASE_VERSION}"
